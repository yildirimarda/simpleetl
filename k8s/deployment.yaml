apiVersion: apps/v1
kind: Deployment
metadata:
  name: simpleetl
  namespace: simpleetl
  labels:
    app: simpleetl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simpleetl
  template:
    metadata:
      labels:
        app: simpleetl
    spec:
      containers:
      - name: simpleetl
        image: simpleetl:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: metrics
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: CONFIG_PATH
          value: "/app/config/config.yaml"
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: simpleetl-config
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}
      serviceAccountName: simpleetl-sa