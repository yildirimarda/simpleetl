apiVersion: v1
kind: ConfigMap
metadata:
  name: simpleetl-config
  namespace: simpleetl
data:
  config.yaml: |
    # SimpleETL Configuration
    logging:
      level: INFO
      format: json
      file: /app/logs/etl.log

    metrics:
      enabled: true
      port: 8000

    database:
      default:
        driver: postgresql
        host: postgres-service
        port: 5432
        database: etl_prod
        username: etl_user
        password: etl_password

    storage:
      local:
        path: /app/data
      s3:
        bucket: etl-data-bucket
        region: us-east-1

    environment: production